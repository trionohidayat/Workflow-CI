global:
  scrape_interval: 5s # Waktu tarik data dipercepat ke 5 detik sekali agar visualisasi grafik cepat muncul saat di-screenshot
  evaluation_interval: 5s

scrape_configs:
  - job_name: "ml_churn_model_monitoring"
    static_configs:
      - targets: ["host.docker.internal:8000"] # Mengarah ke skrip FastAPI serving lokal kalian