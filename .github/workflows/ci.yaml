name: Machine Learning CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  retrain-model:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout kode dari repositori GitHub ke runner
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 2. Setup Python environment di runner
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    # 3. Install dependency yang dibutuhkan
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 dagshub scikit-learn pandas numpy

# 4. Inisialisasi Environment Tracking MLflow secara Global lalu Jalankan MLflow Project
    - name: Run MLflow Project (Retraining)
      env:
        DAGSHUB_CLIENT_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        MLFLOW_TRACKING_USERNAME: trionohidayat3
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        # 1. Konfigurasi kredensial global DagsHub di mesin runner
        dagshub login --token ${{ secrets.DAGSHUB_TOKEN }}
        
        # 2. Jalankan retraining model dengan meneruskan variabel lingkungan sistem
        mlflow run MLProject/ --env-manager local